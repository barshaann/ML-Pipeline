<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concrete Strength Predictor | Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            /* High-End Premium Light Theme */
            --bg-color: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --surface-color: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --input-bg: #f1f5f9;
            --accent-color: #0f172a;
            --accent-glow: rgba(15, 23, 42, 0.08);
            --btn-text: #ffffff;
            --btn-hover: #334155;
            --shadow-sm: 0 12px 32px rgba(15, 23, 42, 0.04);
            --shadow-lg: 0 24px 48px rgba(15, 23, 42, 0.08);
            --gradient-text: linear-gradient(to right, #0f172a, #475569);
        }

        [data-theme="dark"] {
            /* Ultra-Premium Dark Theme */
            --bg-color: linear-gradient(135deg, #09090b 0%, #1e1e24 100%);
            --surface-color: #141415;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #27272a;
            --input-bg: #09090b;
            --accent-color: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.08);
            --btn-text: #09090b;
            --btn-hover: #e2e8f0;
            --shadow-sm: 0 16px 40px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 24px 48px rgba(0, 0, 0, 0.8);
            --gradient-text: linear-gradient(to right, #ffffff, #cbd5e1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: color 0.5s ease;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            margin: 40px 20px;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: background 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease;
        }

        .hero-banner {
            width: 100%;
            height: 220px;
            background-image: url('concrete-bg.png');
            background-size: cover;
            background-position: center 30%;
            position: relative;
        }

        .hero-banner::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            background: linear-gradient(to bottom, transparent, var(--surface-color));
        }

        .content-wrapper {
            padding: 0 40px 40px 40px;
            position: relative;
            margin-top: -30px;
            z-index: 2;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes spinClick {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }
        .spin-once {
            animation: spinClick 0.65s ease-in-out;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-top: 8px;
            font-weight: 400;
        }

        .theme-toggle {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 2px 10px var(--accent-glow);
        }

        .theme-toggle:hover {
            transform: scale(1.08) rotate(15deg);
            border-color: var(--text-secondary);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
        }

        .card {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card-header {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        /* Floating Label Inputs */
        .input-group {
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 24px 16px 10px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.2s ease;
            outline: none;
        }

        .input-group input:hover {
            border-color: var(--text-secondary);
        }

        .input-group input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 1px var(--accent-color);
            background: var(--surface-color);
        }

        .input-group label {
            position: absolute;
            left: 16px;
            top: 17px;
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 400;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            transform: translateY(-9px) scale(0.85);
            transform-origin: left top;
            color: var(--text-primary);
        }

        .action-row {
            grid-column: 1 / -1;
            display: flex;
            gap: 20px;
            margin-top: 24px;
        }

        button.primary-btn, button.secondary-btn {
            flex: 1;
            padding: 18px;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 1.05rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: -0.01em;
        }

        .primary-btn {
            background: var(--accent-color);
            color: var(--btn-text);
            border: 1px solid transparent;
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .primary-btn:hover {
            background: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 32px var(--accent-glow);
        }

        .secondary-btn {
            background: var(--input-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .secondary-btn:hover {
            border-color: var(--text-secondary);
            background: var(--surface-color);
            transform: translateY(-2px);
        }

        #result {
            grid-column: 1 / -1;
            margin-top: 20px;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            font-size: 1.25rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
            display: none;
        }

        #result.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.4);
            border-left: 4px solid #10b981;
            color: var(--text-primary);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.4);
            border-left: 4px solid #ef4444;
            color: var(--text-primary);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; gap: 40px; }
            .action-row { flex-direction: column; }
            .content-wrapper { padding: 0 20px 30px 20px; }
            h1 { font-size: 2.2rem; }
            .hero-banner { height: 160px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="hero-banner"></div>
        
        <div class="content-wrapper">
            <div class="header">
                <div>
                    <h1>Concrete Strength Predictor</h1>
                </div>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle Theme">
                    <i class="ph ph-moon"></i>
                </button>
            </div>

            <form id="predictionForm" class="form-grid">
                
                <!-- Card 1 -->
                <div class="card">
                    <div class="card-header"><i class="ph ph-cube"></i> Mixture Proportions</div>
                    <div class="input-group">
                        <input type="number" id="cement" step="any" required placeholder=" ">
                        <label for="cement">Cement</label>
                    </div>
                    <div class="input-group">
                        <input type="number" id="sand" step="any" required placeholder=" ">
                        <label for="sand">Sand</label>
                    </div>
                    <div class="input-group">
                        <input type="number" id="water" step="any" required placeholder=" ">
                        <label for="water">Water</label>
                    </div>
                    <div class="input-group">
                        <input type="number" id="nca" step="any" required placeholder=" ">
                        <label for="nca">Natural Aggregate (NCA)</label>
                    </div>
                    <div class="input-group">
                        <input type="number" id="rca" step="any" required placeholder=" ">
                        <label for="rca">Recycled Aggregate (RCA)</label>
                    </div>
                    <div class="input-group">
                        <input type="number" id="w_c" step="any" required placeholder=" ">
                        <label for="w_c">W/C Ratio</label>
                    </div>
                </div>

                <!-- Card 2 -->
                <div class="card">
                    <div class="card-header"><i class="ph ph-faders"></i> Physical Properties</div>
                    <div class="input-group">
                        <input type="number" id="cs_area" step="any" required placeholder=" ">
                        <label for="cs_area">C/S Area (Required)</label>
                    </div>
                    <div class="input-group">
                        <input type="number" id="shape_factor" step="any" placeholder=" ">
                        <label for="shape_factor">Shape Factor</label>
                    </div>
                    <div class="input-group">
                        <input type="number" id="density" step="any" placeholder=" ">
                        <label for="density">Density</label>
                    </div>
                    <div class="input-group">
                        <input type="number" id="slump" step="any" placeholder=" ">
                        <label for="slump">Slump</label>
                    </div>
                    <div class="input-group">
                        <input type="number" id="width_dia" step="any" placeholder=" ">
                        <label for="width_dia">Width / Dia</label>
                    </div>
                    <div class="input-group">
                        <input type="number" id="length" step="any" placeholder=" ">
                        <label for="length">Length</label>
                    </div>
                </div>

                <div class="action-row">
                    <button type="button" id="randomBtn" class="secondary-btn">
                        <i class="ph ph-shuffle"></i> Generate Sample Data
                    </button>
                    <button type="submit" class="primary-btn">
                        Predict Strength <i class="ph ph-arrow-right"></i>
                    </button>
                </div>

                <div id="result"></div>
            </form>
        </div>
    </div>
    
    <script>
        // Theme Logic
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        const icon = themeToggle.querySelector('i');
        const savedTheme = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateIcon(savedTheme);
        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateIcon(newTheme);
            
            // Add spinning animation
            icon.classList.remove('spin-once');
            void icon.offsetWidth; // Trigger reflow
            icon.classList.add('spin-once');
        });
        function updateIcon(theme) {
            icon.className = theme === 'dark' ? 'ph ph-sun' : 'ph ph-moon';
        }

        // Fetch Logic
        document.getElementById('predictionForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const requiredStrict = ['cement', 'sand', 'water', 'nca', 'w_c', 'cs_area'];
            const hasZero = requiredStrict.some(id => {
                const val = parseFloat(document.getElementById(id).value);
                return isNaN(val) || val <= 0;
            });
            
            const rcaVal = parseFloat(document.getElementById('rca').value);
            const rcaInvalid = isNaN(rcaVal) || rcaVal < 0;

            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            setTimeout(() => resultDiv.classList.add('show'), 10);

            if (hasZero) {
                resultDiv.innerHTML = `<strong style="color:#ef4444;">Invalid Input: Cement, Sand, Water, NCA, W/C Ratio, and C/S Area MUST be greater than 0.</strong>`;
                resultDiv.className = 'error show';
                return;
            }
            if (rcaInvalid) {
                resultDiv.innerHTML = `<strong style="color:#ef4444;">Invalid Input: Recycled Aggregate (RCA) cannot be negative.</strong>`;
                resultDiv.className = 'error show';
                return;
            }

            resultDiv.className = '';
            resultDiv.innerHTML = "<i class='ph ph-spinner-gap ph-spin'></i> Processing...";

            const data = {
                cement: parseFloat(document.getElementById('cement').value),
                sand:   parseFloat(document.getElementById('sand').value),
                water:  parseFloat(document.getElementById('water').value),
                nca:    parseFloat(document.getElementById('nca').value),
                rca:    parseFloat(document.getElementById('rca').value),
                w_c:    parseFloat(document.getElementById('w_c').value),
                cs_area: parseFloat(document.getElementById('cs_area').value)
            };
            const optionals = ['shape_factor', 'density', 'slump', 'width_dia', 'length'];
            optionals.forEach(opt => {
                const val = document.getElementById(opt).value;
                if (val !== '') data[opt] = parseFloat(val);
            });

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const resultData = await response.json();
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div style="font-size: 1rem; color: var(--text-secondary); margin-bottom: 8px;">Predicted Ultimate Load: <strong>${resultData.predicted_ultimate_load.toFixed(2)} kN</strong></div>
                        <div style="font-size: 1.4rem;">Predicted Strength: <strong style="color: #10b981; text-shadow: 0 0 10px rgba(16,185,129,0.5);">${resultData.predicted_strength.toFixed(2)} MPa</strong></div>
                    `;
                    resultDiv.className = 'success show';
                } else {
                    let errorMsg = resultData.detail;
                    if (Array.isArray(errorMsg)) errorMsg = errorMsg[0].msg;
                    resultDiv.innerHTML = `Error: <strong style="color:#ef4444;">${errorMsg}</strong>`;
                    resultDiv.className = 'error show';
                }
            } catch (error) {
                resultDiv.innerHTML = 'Network Error: Could not connect to API.';
                resultDiv.className = 'error show';
            }
        });

        // Realistic Sample Data Generator
        document.getElementById('randomBtn').addEventListener('click', function() {
            // Real profiles from the dataset to ensure physically realistic combinations
            const profiles = [
                { cement: 407.0, sand: 639.0, water: 172.0, nca: 1116.0, rca: 0.0, w_c: 0.42, cs_area: 57600.0, shape_factor: 10.0, density: 2400.0, slump: 170.0, width_dia: 240.0, length: 2400.0 },
                { cement: 380.0, sand: 650.0, water: 171.0, nca: 1200.0, rca: 0.0, w_c: 0.45, cs_area: 17671.0, shape_factor: 2.0, density: 2400.0, slump: 75.0, width_dia: 150.0, length: 300.0 },
                { cement: 277.16, sand: 343.11, water: 110.86, nca: 482.66, rca: 0.0, w_c: 0.4, cs_area: 7854.0, shape_factor: 2.0, density: 2600.0, slump: 87.5, width_dia: 100.0, length: 200.0 },
                { cement: 372.73, sand: 726.69, water: 197.17, nca: 1031.46, rca: 0.06, w_c: 0.53, cs_area: 17671.0, shape_factor: 2.0, density: 2316.0, slump: 104.0, width_dia: 150.0, length: 300.0 }
            ];
            
            const selected = profiles[Math.floor(Math.random() * profiles.length)];
            
            // Add a tiny bit of realistic noise (-3% to +3%) to mixture proportions
            const noise = (val) => val === 0 ? 0 : val * (1 + (Math.random() * 0.06 - 0.03));
            
            // In the dataset, RCA is provided as a replacement ratio. Here are ALL the exact ratios from your dataset!
            const rcaRatios = [0.0, 0.02, 0.04, 0.06, 0.08, 0.10, 0.20, 0.25, 0.30, 0.35, 0.40, 0.50, 0.60, 0.75, 1.0];
            const rcaRatio = rcaRatios[Math.floor(Math.random() * rcaRatios.length)];
            
            document.getElementById('cement').value = noise(selected.cement).toFixed(1);
            document.getElementById('sand').value = noise(selected.sand).toFixed(1);
            document.getElementById('water').value = noise(selected.water).toFixed(1);
            document.getElementById('nca').value = noise(selected.nca).toFixed(1);
            document.getElementById('rca').value = rcaRatio.toFixed(2);
            document.getElementById('w_c').value = selected.w_c.toFixed(2); // W/C ratio usually stays strict
            
            // Physical properties should match exact mold sizes, no noise
            document.getElementById('cs_area').value = selected.cs_area;
            document.getElementById('shape_factor').value = selected.shape_factor;
            document.getElementById('density').value = noise(selected.density).toFixed(1);
            document.getElementById('slump').value = noise(selected.slump).toFixed(1);
            document.getElementById('width_dia').value = selected.width_dia;
            document.getElementById('length').value = selected.length;
            
            const resultDiv = document.getElementById('result');
            resultDiv.classList.remove('show');
            setTimeout(() => {
                if (!resultDiv.classList.contains('show')) resultDiv.style.display = 'none';
            }, 400);
        });
    </script>
</body>
</html>
